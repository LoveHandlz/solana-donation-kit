<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate SOL • Phantom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/@solana/web3.js@1.95.3/dist/index.iife.min.js"></script>
    <style>
        body { font-family: system_ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="max-w-2xl mx-auto px-6 py-16">
        <div class="text-center mb-12">
            <div class="text-7xl mb-4">🪙</div>
            <h1 class="text-5xl font-bold tracking-tight">Donate SOL</h1>
            <p class="text-teal-400 text-xl mt-2">Powered by Phantom Wallet</p>
        </div>

        <div id="status" class="bg-zinc-900 rounded-3xl p-8 mb-10 text-center text-lg min-h-[100px]"></div>

        <div id="walletInfo" class="hidden bg-zinc-900 rounded-3xl p-8 mb-10">
            <p class="text-sm text-zinc-400 mb-2">Connected Wallet</p>
            <div class="font-mono text-sm bg-zinc-800 p-4 rounded-2xl break-all" id="connectedAddress"></div>
        </div>

        <div class="bg-zinc-900 rounded-3xl p-10">
            <h2 class="text-3xl font-semibold text-center mb-8">Choose Amount</h2>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <button onclick="quickDonate(0.1)" class="bg-zinc-800 hover:bg-teal-600 py-6 rounded-2xl font-bold text-xl">0.1 SOL</button>
                <button onclick="quickDonate(0.5)" class="bg-zinc-800 hover:bg-teal-600 py-6 rounded-2xl font-bold text-xl">0.5 SOL</button>
                <button onclick="quickDonate(1)" class="bg-zinc-800 hover:bg-teal-600 py-6 rounded-2xl font-bold text-xl">1 SOL</button>
                <button onclick="quickDonate(5)" class="bg-zinc-800 hover:bg-teal-600 py-6 rounded-2xl font-bold text-xl">5 SOL</button>
            </div>

            <div class="flex gap-4">
                <input id="customAmount" type="number" step="0.01" min="0.01" placeholder="Custom SOL amount" 
                       class="flex-1 bg-zinc-800 px-6 py-5 rounded-2xl text-xl focus:outline-none focus:ring-2 focus:ring-teal-500">
                <button onclick="sendCustom()" 
                        class="bg-teal-500 hover:bg-teal-600 px-12 py-5 rounded-2xl font-bold text-xl transition-all">
                    Send
                </button>
            </div>

            <p class="text-center text-zinc-500 text-sm mt-10">
                Sending to: <span class="font-mono text-teal-400">3L3KmAx7ZgL5H6W3jQZQyh6Ycps11twXz1XfEjf23M1t</span>
            </p>
        </div>
    </div>

    <script>
        const RECIPIENT = "3L3KmAx7ZgL5H6W3jQZQyh6Ycps11twXz1XfEjf23M1t";

        let provider = null;
        let publicKey = null;
        let connection = null;

        function showStatus(message, isError = false) {
            const el = document.getElementById('status');
            el.innerHTML = `<span class="${isError ? 'text-red-400' : 'text-teal-400'}">${message}</span>`;
        }

        async function connectWallet() {
            try {
                if (!window.solana || !window.solana.isPhantom) {
                    showStatus("❌ Phantom not detected.<br>Install Phantom extension and refresh the page.", true);
                    return;
                }

                provider = window.solana;
                const resp = await provider.connect();
                publicKey = resp.publicKey;

                connection = new solanaWeb3.Connection("https://solana-rpc.publicnode.com", "confirmed");

                document.getElementById('walletInfo').classList.remove('hidden');
                document.getElementById('connectedAddress').textContent = publicKey.toString();

                showStatus("✅ Wallet connected successfully!<br>Choose an amount to donate.", false);

            } catch (err) {
                console.error(err);
                showStatus("❌ Connection failed.<br>Make sure Phantom is unlocked and approve the popup.", true);
            }
        }

        async function sendTransaction(amount) {
            if (!publicKey || !provider) {
                showStatus("❌ Please connect wallet first!", true);
                return;
            }

            const safeAmount = Math.max(0.001, amount - 0.015);

            try {
                showStatus("Preparing transaction...");

                const { blockhash } = await connection.getLatestBlockhash("finalized");

                const transaction = new solanaWeb3.Transaction().add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: publicKey,
                        toPubkey: new solanaWeb3.PublicKey(RECIPIENT),
                        lamports: Math.floor(safeAmount * solanaWeb3.LAMPORTS_PER_SOL)
                    })
                );

                transaction.recentBlockhash = blockhash;
                transaction.feePayer = publicKey;

                showStatus("Please approve the transaction in Phantom...");

                const { signature } = await provider.signAndSendTransaction(transaction);

                showStatus(`
                    ✅ <strong>Thank you!</strong><br>
                    SOL sent successfully!<br>
                    <a href="https://solscan.io/tx/${signature}" target="_blank" class="underline text-teal-400">View transaction on Solscan →</a>
                `);

            } catch (err) {
                console.error(err);
                if (err.message?.includes("User rejected") || err.code === 4001) {
                    showStatus("❌ You cancelled the transaction.", true);
                } else if (err.message?.toLowerCase().includes("insufficient")) {
                    showStatus("❌ Not enough SOL in your wallet.", true);
                } else {
                    showStatus("❌ Transaction failed.<br>Please try again.", true);
                }
            }
        }

        function quickDonate(amount) {
            sendTransaction(amount);
        }

        function sendCustom() {
            const amount = parseFloat(document.getElementById('customAmount').value);
            if (!amount || amount <= 0) {
                showStatus("Please enter a valid amount", true);
                return;
            }
            sendTransaction(amount);
        }

        window.onload = () => {
            showStatus('Click the Connect button below to start.');
        };
    </script>

    <!-- Connect Button -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2">
        <button onclick="connectWallet()" 
                class="bg-white text-black font-bold text-2xl px-10 py-5 rounded-3xl shadow-2xl hover:scale-105 transition-all flex items-center gap-3">
            <i class="fas fa-wallet"></i> Connect Phantom Wallet
        </button>
    </div>

</body>
</html>
