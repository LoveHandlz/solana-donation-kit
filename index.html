<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate SOL • Phantom Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://unpkg.com/@solana/web3.js@1.95.3/dist/index.iife.min.js"></script>
    <style>
        body { font-family: system_ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="max-w-2xl mx-auto px-6 py-16">
        <div class="text-center mb-12">
            <div class="text-7xl mb-4">🪙</div>
            <h1 class="text-5xl font-bold tracking-tight">Donate SOL</h1>
            <p class="text-teal-400 text-xl mt-2">Send from your Phantom Wallet</p>
        </div>

        <!-- Status -->
        <div id="status" class="bg-zinc-900 rounded-3xl p-6 mb-8 text-center min-h-[110px] text-lg"></div>

        <!-- Wallet Info -->
        <div id="walletInfo" class="hidden bg-zinc-900 rounded-3xl p-8 mb-10 border border-teal-500">
            <p class="text-sm text-zinc-400 mb-3">Connected Wallet</p>
            <div class="font-mono text-sm bg-zinc-800 p-4 rounded-2xl break-all mb-4" id="connectedAddress"></div>
            
            <div class="flex justify-between items-center">
                <p class="text-sm text-zinc-400">Your SOL Balance:</p>
                <div class="flex items-center gap-3">
                    <span id="balance" class="font-mono text-2xl font-bold text-teal-400">0.00</span>
                    <button onclick="refreshBalance()" class="text-xs bg-zinc-700 hover:bg-zinc-600 px-3 py-1 rounded-xl">Refresh</button>
                </div>
            </div>
        </div>

        <!-- Donation Section -->
        <div class="bg-zinc-900 rounded-3xl p-10">
            <h2 class="text-3xl font-semibold text-center mb-8">Choose Amount to Send</h2>
            
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <button onclick="quickDonate(0.01)" class="bg-zinc-800 hover:bg-teal-600 py-6 rounded-2xl font-bold text-xl transition-colors">Test 0.01 SOL</button>
                <button onclick="quickDonate(0.1)" class="bg-zinc-800 hover:bg-teal-600 py-6 rounded-2xl font-bold text-xl transition-colors">0.1 SOL</button>
                <button onclick="quickDonate(0.5)" class="bg-zinc-800 hover:bg-teal-600 py-6 rounded-2xl font-bold text-xl transition-colors">0.5 SOL</button>
                <button onclick="quickDonate(1)" class="bg-zinc-800 hover:bg-teal-600 py-6 rounded-2xl font-bold text-xl transition-colors">1 SOL</button>
            </div>

            <div class="flex gap-4">
                <input id="customAmount" type="number" step="0.01" min="0.01" placeholder="Custom amount in SOL" 
                       class="flex-1 bg-zinc-800 px-6 py-5 rounded-2xl text-xl focus:outline-none focus:ring-2 focus:ring-teal-500">
                <button onclick="sendCustom()" 
                        class="bg-teal-500 hover:bg-teal-600 px-12 py-5 rounded-2xl font-bold text-xl transition-all">
                    Send
                </button>
            </div>

            <p class="text-center text-zinc-500 text-sm mt-10">
                Recipient Address:<br>
                <span class="font-mono text-teal-400 break-all">3L3KmAx7ZgL5H6W3jQZQyh6Ycps11twXz1XfEjf23M1t</span>
            </p>
        </div>
    </div>

    <script>
        const RECIPIENT = "3L3KmAx7ZgL5H6W3jQZQyh6Ycps11twXz1XfEjf23M1t";

        let provider = null;
        let publicKey = null;
        let connection = null;

        function showStatus(message, isError = false) {
            const el = document.getElementById('status');
            el.innerHTML = `<span class="${isError ? 'text-red-400' : 'text-teal-400'}">${message}</span>`;
        }

        async function connectWallet() {
            try {
                if (!window.solana || !window.solana.isPhantom) {
                    showStatus("❌ Phantom extension not detected.<br>Please install Phantom from the Chrome Web Store and refresh the page.", true);
                    return;
                }

                provider = window.solana;
                
                // Simple and reliable connect
                const resp = await provider.connect();
                publicKey = resp.publicKey;

                // Use reliable RPC
                connection = new solanaWeb3.Connection("https://solana-rpc.publicnode.com", "confirmed");

                document.getElementById('walletInfo').classList.remove('hidden');
                document.getElementById('connectedAddress').textContent = publicKey.toString();

                await refreshBalance();
                showStatus("✅ Wallet connected successfully!<br>You can now send SOL.", false);

            } catch (err) {
                console.error(err);
                showStatus("❌ Failed to connect.<br>Make sure Phantom is unlocked and try again.", true);
            }
        }

        async function refreshBalance() {
            if (!publicKey || !connection) return;
            try {
                const balanceLamports = await connection.getBalance(publicKey);
                const balanceSOL = (balanceLamports / solanaWeb3.LAMPORTS_PER_SOL).toFixed(4);
                document.getElementById('balance').textContent = balanceSOL;
            } catch (e) {
                document.getElementById('balance').textContent = "—";
            }
        }

        async function sendTransaction(amount) {
            if (!publicKey || !provider) {
                showStatus("❌ Please connect your Phantom wallet first!", true);
                return;
            }

            const safeAmount = Math.max(0.001, amount - 0.015); // buffer for fees

            try {
                showStatus("Preparing transaction...");

                const { blockhash } = await connection.getLatestBlockhash("finalized");

                const transaction = new solanaWeb3.Transaction().add(
                    solanaWeb3.SystemProgram.transfer({
                        fromPubkey: publicKey,
                        toPubkey: new solanaWeb3.PublicKey(RECIPIENT),
                        lamports: Math.floor(safeAmount * solanaWeb3.LAMPORTS_PER_SOL)
                    })
                );

                transaction.recentBlockhash = blockhash;
                transaction.feePayer = publicKey;

                showStatus("Please approve in Phantom...");

                const { signature } = await provider.signAndSendTransaction(transaction);

                showStatus(`
                    ✅ <strong>Thank you!</strong><br>
                    Transaction sent successfully!<br>
                    <span class="text-xs font-mono">${signature.substring(0, 28)}...</span><br>
                    <a href="https://solscan.io/tx/${signature}" target="_blank" class="text-teal-400 underline">View on Solscan →</a>
                `);

                setTimeout(refreshBalance, 4000);

            } catch (err) {
                console.error(err);
                if (err.message?.includes("User rejected") || err.code === 4001) {
                    showStatus("❌ Transaction was cancelled in Phantom.", true);
                } else if (err.message?.toLowerCase().includes("insufficient")) {
                    showStatus("❌ Not enough SOL in your wallet (remember fees ~0.015 SOL).", true);
                } else {
                    showStatus("❌ Transaction failed.<br>" + (err.message || "Unknown error") + "<br>Try the 0.01 SOL test button.", true);
                }
            }
        }

        function quickDonate(amount) {
            sendTransaction(amount);
        }

        function sendCustom() {
            const val = parseFloat(document.getElementById('customAmount').value);
            if (!val || val <= 0) {
                showStatus("Please enter a valid amount.", true);
                return;
            }
            sendTransaction(val);
        }

        // Initial message
        window.onload = () => {
            showStatus('Click the button below to connect Phantom and send SOL.<br>Make sure the Phantom extension is installed and unlocked.');
        };
    </script>

    <!-- Connect Button -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-50">
        <button onclick="connectWallet()" 
                class="bg-white text-black font-bold text-2xl px-10 py-5 rounded-3xl shadow-2xl hover:scale-105 transition-all flex items-center gap-3">
            <i class="fas fa-wallet"></i> Connect Phantom Wallet
        </button>
    </div>

</body>
</html>
