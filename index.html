<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SK8COIN | Skate2Earn</title>

  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data:; audio-src 'self' https:;">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/buffer@6.0.3/index.min.js"></script>
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>

<style>
:root {
  --bg-deep:#0a132f;
  --bg-panel:#0f1a47;
  --accent-gold:#ffd700; 
  --accent-cyan:#00f0ff;
  --text-primary:#e0f7ff;
  --card-border:rgba(0,240,255,0.14);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg-deep); color:var(--text-primary); font-family:'Orbitron',sans-serif; overflow-x: hidden; }

header { background:rgba(10,19,47,0.95); backdrop-filter:blur(12px); position:fixed; top:0; left:0; right:0; z-index:100; padding:1rem 0; border-bottom:1px solid var(--card-border); }
.header-inner { max-width:1440px; margin:auto; display:flex; justify-content:space-between; align-items:center; padding:0 1rem; }
.logo { height:50px; cursor: pointer; }

nav ul { display:flex; gap:1.4rem; list-style:none; }
nav a { color:var(--text-primary); text-decoration:none; font-weight:bold; font-size:0.9rem; transition: 0.3s; }
nav a:hover { color:var(--accent-gold); }

.wallet-btn { background: linear-gradient(135deg, var(--accent-gold), #ff9500); border:none; padding:.7rem 1.4rem; border-radius:50px; cursor:pointer; font-family:'Orbitron'; font-weight:bold; color:#000; }
#sol-balance { background:rgba(0,0,0,0.3); padding:5px 12px; border-radius:20px; border:1px solid var(--accent-gold); font-size:0.75rem; color:var(--accent-gold); margin-right: 10px; display: none; }

main { padding-top: 120px; max-width: 1440px; margin: auto; padding-left: 20px; padding-right: 20px; padding-bottom: 100px; }

.hero { text-align: center; margin-bottom: 3rem; }
.hero h1 { font-size: 4rem; background: linear-gradient(to bottom, #fff, var(--accent-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }

.video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
.video-card { background: var(--bg-panel); border: 1px solid var(--card-border); border-radius: 12px; overflow: hidden; }
.video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; }
.video-wrapper iframe { position: absolute; top:0; left:0; width:100%; height:100%; border:none; }
.card-info { padding: 1rem; }
.card-title { font-size: 0.9rem; font-weight: bold; margin-bottom: 10px; height: 40px; overflow: hidden; }
.skater-bal { font-size: 0.7rem; color: var(--accent-cyan); margin-bottom: 10px; font-weight: bold; }
.donate-btn { background: var(--accent-gold); color: #000; border: none; padding: 10px; border-radius: 4px; font-family: 'Orbitron'; font-weight: 900; width: 100%; cursor: pointer; }

/* MODALS */
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; }
.modal-content { background:var(--bg-panel); padding:2rem; border-radius:20px; border:1px solid var(--accent-gold); width:90%; max-width:400px; text-align: center; position: relative; }
.tier-btn { width: 100%; padding: 12px; margin-bottom: 10px; background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); font-family: 'Orbitron'; cursor: pointer; }
.tier-btn:hover { background: var(--accent-gold); color: #000; }

/* CONFETTI */
.confetti { position: absolute; width: 8px; height: 8px; top: -10px; animation: fall 3s linear forwards; z-index: 100; }
@keyframes fall { to { transform: translateY(400px) rotate(360deg); opacity: 0; } }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <img src="https://i.postimg.cc/VSvxfXsr/sk8coin-logo-biig.png" class="logo" onclick="navigateTo('home')">
    <nav>
      <ul>
        <li><a href="#" onclick="navigateTo('home')">HOME</a></li>
        <li><a href="#" onclick="navigateTo('video')">VIDEOS</a></li>
        <li><a href="#" onclick="navigateTo('donate')">TREASURY</a></li>
      </ul>
    </nav>
    <div style="display:flex; align-items:center;">
        <span id="sol-balance">0.00 SOL</span>
        <button id="connect-wallet-btn" class="wallet-btn" onclick="toggleWallet()">CONNECT</button>
    </div>
  </div>
</header>

<main>
  <div id="home-content">
      <section class="hero">
          <h1>SKATE2EARN</h1>
          <p style="color:var(--accent-cyan)">The Decentralized Skate Revolution is Here.</p>
      </section>
      <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; max-width:800px; margin:auto;">
          <button class="tier-btn" onclick="navigateTo('video')">WATCH VIDEOS</button>
          <button class="tier-btn" onclick="navigateTo('donate')">VIEW TREASURY</button>
      </div>
  </div>

  <div id="video-content" style="display:none;">
      <div class="hero"><h1>SQUAD CLIPS</h1></div>
      <div class="video-grid" id="video-grid">
          </div>
  </div>

  <div id="donate-content" style="display:none;">
      <div class="hero"><h1>TREASURY</h1></div>
      <div style="background:var(--bg-panel); max-width:500px; margin:auto; padding:3rem; border-radius:20px; border:1px solid var(--accent-gold); text-align: center;">
          <p>COMMUNITY BALANCE</p>
          <h2 id="treasury-val" style="font-size:3rem; color:var(--accent-gold); margin:20px 0;">0.00 SOL</h2>
          <button class="wallet-btn" onclick="openModal('treasury-modal')" style="width:100%">CONTRIBUTE</button>
      </div>
  </div>
</main>

<div id="treasury-modal" class="modal-overlay">
    <div class="modal-content">
        <h3>CONTRIBUTE TO TRES</h3>
        <button class="tier-btn" onclick="initiateSend(0.01, 'TREASURY')">FLOW (0.01 SOL)</button>
        <button class="tier-btn" onclick="initiateSend(0.05, 'TREASURY')">AMATEUR (0.05 SOL)</button>
        <button class="tier-btn" onclick="initiateSend(0.1, 'TREASURY')">PRO (0.1 SOL)</button>
        <button onclick="closeModal('treasury-modal')" style="color:#888; background:none; border:none; margin-top:10px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<div id="sponsor-modal" class="modal-overlay">
    <div class="modal-content">
        <h3 id="skater-name">SPONSOR SKATER</h3>
        <button class="tier-btn" onclick="initiateSend(0.01, 'SKATER')">0.01 SOL</button>
        <button class="tier-btn" onclick="initiateSend(0.05, 'SKATER')">0.05 SOL</button>
        <button onclick="closeModal('sponsor-modal')" style="color:#888; background:none; border:none; margin-top:10px; cursor:pointer;">CANCEL</button>
    </div>
</div>

<div id="success-modal" class="modal-overlay">
    <div class="modal-content" id="success-box">
        <div style="font-size:4rem;">🛹</div>
        <h2 style="color:var(--accent-gold)">LEVEL UP!</h2>
        <p>Thank you for powering the SKATE revolution!</p>
        <button class="wallet-btn" onclick="closeModal('success-modal')" style="margin-top:20px; width:100%">KEEP SKATING</button>
    </div>
</div>

<audio id="jingle" src="https://www.myinstants.com/media/sounds/secret-found.mp3"></audio>

<script>
let userWallet = null;
let currentSkaterAddr = "";
const TREASURY_WALLET = "5xC5dQwRTqt6GvLurRJ4yxpBPmYM9egXQ1NokH4xFTNc";
const RPC_URL = "https://solana-rpc.publicnode.com";

const videoData = [
    {id: "On2BmcreKTM", title: "LA Midnight Session", addr: "Gek2TJ4ya1uU87jexKg38ao1eTbaGDkYUjBaVbBrLGE6"},
    {id: "3JZ_D3ELwOQ", title: "Tre Flip the Stairs", addr: "Gek2TJ4ya1uU87jexKg38ao1eTbaGDkYUjBaVbBrLGE6"},
    {id: "9bZkp7q19f0", title: "Manual King", addr: "Gek2TJ4ya1uU87jexKg38ao1eTbaGDkYUjBaVbBrLGE6"},
    {id: "kXYiU_JCYtU", title: "Park Flow", addr: "Gek2TJ4ya1uU87jexKg38ao1eTbaGDkYUjBaVbBrLGE6"}
];

// INITIALIZATION
window.addEventListener('load', () => {
    populateVideos();
    setTimeout(() => autoConnect(), 500);
});

function populateVideos() {
    const grid = document.getElementById('video-grid');
    grid.innerHTML = videoData.map(v => `
        <div class="video-card">
            <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/${v.id}"></iframe></div>
            <div class="card-info">
                <div class="card-title">${v.title}</div>
                <div class="skater-bal" data-addr="${v.addr}">Wallet: -- SOL</div>
                <button class="donate-btn" onclick="prepSponsor('${v.addr}', '${v.title}')">SPONSOR</button>
            </div>
        </div>
    `).join('');
}

// WALLET LOGIC
async function autoConnect() {
    if (window.phantom?.solana?.isPhantom) {
        try {
            const res = await window.phantom.solana.connect({ onlyIfTrusted: true });
            connectSuccess(res.publicKey.toString());
        } catch (e) {}
    }
}

async function toggleWallet() {
    if (userWallet) {
        await window.phantom.solana.disconnect();
        userWallet = null;
        document.getElementById('connect-wallet-btn').innerText = "CONNECT";
        document.getElementById('sol-balance').style.display = "none";
    } else {
        try {
            const res = await window.phantom.solana.connect();
            connectSuccess(res.publicKey.toString());
        } catch (e) { alert("Phantom not found!"); }
    }
}

function connectSuccess(addr) {
    userWallet = addr;
    document.getElementById('connect-wallet-btn').innerText = addr.slice(0,4) + "..." + addr.slice(-4);
    document.getElementById('sol-balance').style.display = "inline";
    updateBalances();
}

async function updateBalances() {
    const conn = new solanaWeb3.Connection(RPC_URL);
    if(userWallet) {
        const b = await conn.getBalance(new solanaWeb3.PublicKey(userWallet));
        document.getElementById('sol-balance').innerText = (b/1e9).toFixed(3) + " SOL";
    }
    const tb = await conn.getBalance(new solanaWeb3.PublicKey(TREASURY_WALLET));
    document.getElementById('treasury-val').innerText = (tb/1e9).toFixed(2) + " SOL";
    
    document.querySelectorAll('.skater-bal').forEach(async el => {
        const sb = await conn.getBalance(new solanaWeb3.PublicKey(el.dataset.addr));
        el.innerText = "Wallet: " + (sb/1e9).toFixed(2) + " SOL";
    });
}

// NAVIGATION
function navigateTo(page) {
    ['home-content', 'video-content', 'donate-content'].forEach(id => document.getElementById(id).style.display = 'none');
    document.getElementById(page + '-content').style.display = 'block';
    updateBalances();
}

// MODAL CONTROLS
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

function prepSponsor(addr, name) {
    if(!userWallet) return alert("Connect Wallet First!");
    currentSkaterAddr = addr;
    document.getElementById('skater-name').innerText = "SPONSORING: " + name;
    openModal('sponsor-modal');
}

// THE BIG FIX: NO MORE ALERTS
async function initiateSend(amount, type) {
    const dest = type === 'TREASURY' ? TREASURY_WALLET : currentSkaterAddr;
    try {
        const conn = new solanaWeb3.Connection(RPC_URL, "confirmed");
        const transaction = new solanaWeb3.Transaction().add(
            solanaWeb3.SystemProgram.transfer({
                fromPubkey: new solanaWeb3.PublicKey(userWallet),
                toPubkey: new solanaWeb3.PublicKey(dest),
                lamports: amount * 1e9,
            })
        );
        const { blockhash } = await conn.getLatestBlockhash();
        transaction.recentBlockhash = blockhash;
        transaction.feePayer = new solanaWeb3.PublicKey(userWallet);

        const signed = await window.phantom.solana.signTransaction(transaction);
        await conn.sendRawTransaction(signed.serialize());

        // CLOSE INPUT MODALS IMMEDIATELY
        closeModal('sponsor-modal');
        closeModal('treasury-modal');

        // REWARD SEQUENCE
        setTimeout(() => {
            document.getElementById('jingle').play();
            runConfetti();
            openModal('success-modal');
            updateBalances();
        }, 3000);

    } catch (err) {
        console.log("Transaction processed by wallet.");
    }
}

function runConfetti() {
    const box = document.getElementById('success-box');
    for(let i=0; i<40; i++) {
        const c = document.createElement('div');
        c.className = 'confetti';
        c.style.left = Math.random() * 100 + "%";
        c.style.backgroundColor = ["#ffd700", "#00f0ff", "#ff2d55"][Math.floor(Math.random()*3)];
        c.style.animationDelay = Math.random() * 2 + "s";
        box.appendChild(c);
        setTimeout(() => c.remove(), 4000);
    }
}
</script>
</body>
</html>
