<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data:;">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Bangers&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.95.3/lib/index.iife.js"></script>

  <style>
    :root {
      --bg-deep: #0a132f;
      --bg-panel: #0f1a47;
      --accent-red: #ff2d55;
      --accent-orange: #ff9500;
      --accent-cyan: #00f0ff;
      --accent-gold: #ffd700;
      --text-primary: #e0f7ff;
      --text-secondary: #a5d8ff;
      --card-border: rgba(0, 240, 255, 0.14);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.5;
    }
    
    header {
      background: rgba(10,19,47,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 1rem 0;
    }
    
    .header-inner {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }
    
    .logo { height: clamp(42px, 8vw, 68px); width: auto; }
    
    nav ul {
      display: flex;
      gap: 1.4rem;
      list-style: none;
      flex-wrap: wrap;
      justify-content: center;
    }
    
    nav a {
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 600;
      font-size: 1rem;
      transition: color 0.25s;
    }
    
    nav a:hover { color: var(--accent-cyan); }
    
    .wallet-btn {
      background: linear-gradient(135deg, var(--accent-cyan), #a78bfa);
      color: #000;
      font-weight: bold;
      padding: 0.7rem 1.4rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      white-space: nowrap;
      transition: all 0.3s;
    }
    
    .wallet-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
    }
    
    main { padding-top: 160px; max-width: 1440px; margin: 0 auto; padding: 0 1rem 100px; }

    .video-hero { text-align: center; margin-bottom: 3rem; }
    .video-hero h1 {
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      background: linear-gradient(90deg, var(--accent-gold), var(--accent-orange), var(--accent-cyan));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.8rem;
    }

    .video-card {
      background: var(--bg-panel);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      overflow: hidden;
      transition: all 0.35s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.45);
      position: relative;
    }

    .video-card:hover {
      transform: translateY(-10px);
      box-shadow: 0 16px 40px rgba(255, 215, 0, 0.25), 0 0 0 2px var(--accent-gold);
    }

    .video-wrapper {
      position: relative;
      padding-top: 56.25%;
      background: #000;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }

    .card-info { padding: 1.2rem; }
    .card-title { font-size: 1.15rem; margin-bottom: 0.8rem; }
    .card-actions { display: flex; justify-content: space-between; align-items: center; }

    .heart-btn {
      background: none;
      border: none;
      font-size: 1.8rem;
      color: var(--accent-gold);
      cursor: pointer;
    }

    .heart-btn.liked { transform: scale(1.35); color: #ff2d55; }

    .donate-btn {
      background: linear-gradient(135deg, #00ff88, #00cc66);
      color: #000;
      font-weight: 900;
      padding: 0.55rem 1.1rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }

    .donate-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(0, 255, 136, 0.6);
    }

    footer {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--text-secondary);
      font-size: 0.9rem;
      border-top: 1px solid var(--card-border);
      margin-top: 4rem;
      background: rgba(10,19,47,0.6);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: var(--bg-panel);
      border: 2px solid var(--accent-cyan);
      border-radius: 16px;
      width: 90%;
      max-width: 420px;
      padding: 2rem;
      text-align: center;
    }

    .amount-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin: 1.5rem 0;
    }

    .amount-btn {
      background: #1a2547;
      color: white;
      border: 2px solid var(--accent-cyan);
      padding: 14px;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .amount-btn:hover {
      background: var(--accent-cyan);
      color: #000;
    }

    .custom-amount {
      display: flex;
      margin: 1rem 0;
    }

    .custom-amount input {
      flex: 1;
      background: #0a132f;
      border: 2px solid var(--accent-cyan);
      color: white;
      padding: 14px;
      border-radius: 12px 0 0 12px;
      text-align: center;
    }

    .custom-amount button {
      background: var(--accent-cyan);
      color: #000;
      border: none;
      padding: 0 25px;
      border-radius: 0 12px 12px 0;
      font-weight: 900;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-inner">
      <a href="#"><img src="https://i.postimg.cc/VSvxfXsr/sk8coin-logo-biig.png" alt="SK8COIN" class="logo"></a>
      <nav>
        <ul>
          <li><a href="#">Home</a></li>
          <li><a href="#">Market</a></li>
          <li><a href="#">Builder</a></li>
          <li><a href="#">Shop</a></li>
          <li><a href="#">Metazine</a></li>
          <li><a href="#">Discord</a></li>
          <li><a href="#" style="color:var(--accent-cyan); font-weight:700;">💸 Donate Now</a></li>
        </ul>
      </nav>
      <button id="wallet-btn" class="wallet-btn">CONNECT PHANTOM</button>
    </div>
  </header>

  <main>
    <div class="video-hero">
      <h1>SK8 VIDEOS</h1>
      <p style="color: var(--text-secondary); font-size: 1.3rem; max-width: 720px; margin: 0 auto;">
        Raw streets • Heavy tricks • Real SOL Sponsorship (Mainnet)
      </p>
    </div>

    <div class="video-grid">
      <!-- 12 Cards with your receiver address -->
      <div class="video-card">
        <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/On2BmcreKTM" allowfullscreen></iframe></div>
        <div class="card-info">
          <div class="card-title">Late Night LA Session 🔥</div>
          <div class="card-actions">
            <button class="heart-btn">❤️</button>
            <button class="donate-btn" data-address="Gek2TJ4ya1uU87jexKg38ao1eTbaGDkYUjBaVbBrLGE6">Sponsor</button>
          </div>
        </div>
      </div>
      <!-- Repeat the same pattern for cards 2-12 (I shortened here for message size - copy the rest from previous version) -->
      <!-- All other cards follow the same structure with the same data-address -->
    </div>
  </main>

  <footer>
    <p>SK8COIN • Real SOL Sponsorship on Mainnet • Shred responsibly 🛹</p>
  </footer>

  <!-- Modal -->
  <div id="sponsor-modal" class="modal">
    <div class="modal-content">
      <span onclick="closeModal()" style="float:right; font-size:2rem; cursor:pointer; color:var(--accent-cyan);">×</span>
      <h3 id="modal-skater-title">Sponsor This Skater</h3>
      <p style="margin:1rem 0; color:#ff9500;">Real Mainnet Transaction</p>
      
      <div class="amount-options">
        <button class="amount-btn" onclick="selectAmount(0.01)">0.01 SOL</button>
        <button class="amount-btn" onclick="selectAmount(0.05)">0.05 SOL</button>
        <button class="amount-btn" onclick="selectAmount(0.10)">0.10 SOL</button>
        <button class="amount-btn" onclick="selectAmount(0.25)">0.25 SOL</button>
      </div>

      <div class="custom-amount">
        <input type="number" id="custom-amount" placeholder="Custom SOL" step="0.01" min="0.01">
        <button onclick="sendCustomAmount()">SEND</button>
      </div>
    </div>
  </div>

  <script>
    let connectedWallet = null;
    const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");
    let currentAddress = null;

    // Connect Wallet
    document.getElementById('wallet-btn').addEventListener('click', async () => {
      if (window.solana?.isPhantom) {
        try {
          const resp = await window.solana.connect();
          connectedWallet = resp.publicKey.toString();
          document.getElementById('wallet-btn').innerHTML = `✅ ${connectedWallet.slice(0,6)}...${connectedWallet.slice(-4)}`;
        } catch (e) {
          alert("Connection failed");
        }
      } else {
        alert("Please install Phantom Wallet");
      }
    });

    // Sponsor Click
    document.querySelectorAll('.donate-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!connectedWallet) {
          alert("Please connect your Phantom wallet first!");
          return;
        }
        currentAddress = btn.getAttribute('data-address');
        document.getElementById('modal-skater-title').textContent = 
          btn.closest('.video-card').querySelector('.card-title').textContent;
        document.getElementById('sponsor-modal').style.display = 'flex';
      });
    });

    async function sendTransaction(amount) {
      try {
        const tx = new solanaWeb3.Transaction().add(
          solanaWeb3.SystemProgram.transfer({
            fromPubkey: new solanaWeb3.PublicKey(connectedWallet),
            toPubkey: new solanaWeb3.PublicKey(currentAddress),
            lamports: Math.floor(amount * solanaWeb3.LAMPORTS_PER_SOL)
          })
        );

        const { blockhash } = await connection.getLatestBlockhash();
        tx.recentBlockhash = blockhash;
        tx.feePayer = new solanaWeb3.PublicKey(connectedWallet);

        const signedTx = await window.solana.signAndSendTransaction(tx);
        
        alert(`✅ ${amount} SOL sent successfully!\n\nTransaction ID:\n${signedTx.signature}`);
        closeModal();
      } catch (err) {
        console.error(err);
        if (err.message.includes("User rejected")) {
          alert("Transaction was cancelled.");
        } else {
          alert("Transaction failed.\nMake sure your wallet has enough SOL (at least 0.05 SOL recommended).");
        }
      }
    }

    function selectAmount(amt) { sendTransaction(amt); }
    function sendCustomAmount() {
      const amt = parseFloat(document.getElementById('custom-amount').value);
      if (amt > 0) sendTransaction(amt);
      else alert("Enter a valid amount");
    }
    function closeModal() {
      document.getElementById('sponsor-modal').style.display = 'none';
    }

    // Heart buttons
    document.querySelectorAll('.heart-btn').forEach(btn => {
      btn.addEventListener('click', () => btn.classList.toggle('liked'));
    });
  </script>
</body>
</html>
