<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data:;">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Bangers&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@solana/web3.js@1.95.3/lib/index.iife.js"></script>

  <style>
    /* Your full styles from previous version - unchanged */
    :root {
      --bg-deep: #0a132f; --bg-panel: #0f1a47; --accent-red: #ff2d55;
      --accent-orange: #ff9500; --accent-cyan: #00f0ff; --accent-gold: #ffd700;
      --text-primary: #e0f7ff; --text-secondary: #a5d8ff; --card-border: rgba(0, 240, 255, 0.14);
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--bg-deep); color:var(--text-primary); font-family:'Orbitron',sans-serif; min-height:100vh; }
    /* ... (keep all your previous CSS exactly as in the last version) ... */
  </style>
</head>
<body>
  <!-- Header and Video Grid same as before (with your address) -->

  <main>
    <div class="video-hero">
      <h1>SK8 VIDEOS</h1>
      <p style="color: var(--text-secondary); font-size: 1.3rem; max-width: 720px; margin: 0 auto;">
        Raw streets • Heavy tricks • <strong>Real SOL Sponsorship (Mainnet)</strong>
      </p>
    </div>

    <div class="video-grid">
      <!-- All cards use your address -->
      <!-- Example Card 1 -->
      <div class="video-card">
        <div class="video-wrapper"><iframe src="https://www.youtube.com/embed/On2BmcreKTM" allowfullscreen></iframe></div>
        <div class="card-info">
          <div class="card-title">Late Night LA Session 🔥</div>
          <div class="card-actions">
            <button class="heart-btn">❤️</button>
            <button class="donate-btn" data-address="Gek2TJ4ya1uU87jexKg38ao1eTbaGDkYUjBaVbBrLGE6">Sponsor</button>
          </div>
        </div>
      </div>
      <!-- Repeat for all 12 cards (same data-address) -->
    </div>
  </main>

  <!-- Modal (same as before) -->

  <script>
    let connectedWallet = null;
    const connection = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com", "confirmed");

    document.getElementById('wallet-btn').addEventListener('click', async () => {
      if (window.solana && window.solana.isPhantom) {
        const resp = await window.solana.connect();
        connectedWallet = resp.publicKey.toString();
        document.getElementById('wallet-btn').innerHTML = `✅ ${connectedWallet.slice(0,6)}...${connectedWallet.slice(-4)}`;
      } else {
        alert('Please install Phantom Wallet');
      }
    });

    document.querySelectorAll('.donate-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!connectedWallet) {
          alert('Please connect Phantom wallet first!');
          return;
        }

        const receiver = btn.getAttribute('data-address');
        const title = btn.closest('.video-card').querySelector('.card-title').textContent;

        // Balance check
        try {
          const balance = await connection.getBalance(new solanaWeb3.PublicKey(connectedWallet));
          const solBalance = balance / solanaWeb3.LAMPORTS_PER_SOL;

          if (solBalance < 0.03) {
            alert(`Your wallet has only ${solBalance.toFixed(4)} SOL.\n\nYou need at least 0.03 SOL to cover fees + transfer.`);
            return;
          }
        } catch(e) {}

        // Open modal (keep your modal logic)
        currentSkaterAddress = receiver;
        document.getElementById('modal-skater-title').textContent = title;
        document.getElementById('sponsor-modal').style.display = 'flex';
      });
    });

    async function sendTransaction(amount) {
      try {
        const transaction = new solanaWeb3.Transaction().add(
          solanaWeb3.SystemProgram.transfer({
            fromPubkey: new solanaWeb3.PublicKey(connectedWallet),
            toPubkey: new solanaWeb3.PublicKey(currentSkaterAddress),
            lamports: Math.floor(amount * solanaWeb3.LAMPORTS_PER_SOL)
          })
        );

        const { blockhash } = await connection.getLatestBlockhash('finalized');
        transaction.recentBlockhash = blockhash;
        transaction.feePayer = new solanaWeb3.PublicKey(connectedWallet);

        const signed = await window.solana.signAndSendTransaction(transaction);
        
        alert(`✅ SUCCESS! ${amount} SOL sent on Mainnet!\n\nTx: ${signed.signature}`);
        closeModal();
      } catch (error) {
        console.error(error);
        if (error.message.includes("User rejected")) {
          alert("Transaction cancelled in Phantom.");
        } else if (error.message.includes("insufficient") || error.message.includes("rent")) {
          alert("Insufficient SOL for fees + rent.\n\nTop up your wallet with at least 0.05 SOL.");
        } else {
          alert("Transaction failed. Please try again or check your internet.");
        }
      }
    }

    // Keep your existing selectAmount, sendCustomAmount, closeModal functions
  </script>
</body>
</html>
