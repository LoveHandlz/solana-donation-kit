<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate SOL • Phantom Wallet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body { font-family: system_ui, sans-serif; }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">

    <div class="max-w-2xl mx-auto px-6 py-16">
        <div class="text-center mb-12">
            <div class="text-7xl mb-4">🪙</div>
            <h1 class="text-5xl font-bold tracking-tight">Donate with Solana</h1>
            <p class="text-teal-400 text-xl mt-2">Send SOL using Phantom Wallet</p>
        </div>

        <!-- Status -->
        <div id="status" class="bg-zinc-900 rounded-3xl p-6 mb-8 text-center min-h-[100px] text-lg"></div>

        <!-- Donation Section -->
        <div class="bg-zinc-900 rounded-3xl p-10">
            <h2 class="text-3xl font-semibold text-center mb-8">Choose amount to donate</h2>
           
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-10">
                <button onclick="sendWithDeepLink(0.1)" class="bg-zinc-800 hover:bg-teal-600 py-6 rounded-2xl font-bold text-xl transition-colors">0.1 SOL</button>
                <button onclick="sendWithDeepLink(0.5)" class="bg-zinc-800 hover:bg-teal-600 py-6 rounded-2xl font-bold text-xl transition-colors">0.5 SOL</button>
                <button onclick="sendWithDeepLink(1)" class="bg-zinc-800 hover:bg-teal-600 py-6 rounded-2xl font-bold text-xl transition-colors">1 SOL</button>
                <button onclick="sendWithDeepLink(5)" class="bg-zinc-800 hover:bg-teal-600 py-6 rounded-2xl font-bold text-xl transition-colors">5 SOL</button>
            </div>

            <div class="flex gap-4">
                <input id="customAmount" type="number" step="0.01" min="0.01" placeholder="Custom amount (SOL)"
                       class="flex-1 bg-zinc-800 px-6 py-5 rounded-2xl text-xl focus:outline-none focus:ring-2 focus:ring-teal-500">
                <button onclick="sendCustomDeepLink()" 
                        class="bg-teal-500 hover:bg-teal-600 px-12 py-5 rounded-2xl font-bold text-xl transition-all">
                    Send
                </button>
            </div>

            <p class="text-center text-zinc-500 text-sm mt-10">
                This will open Phantom for you to approve.<br>
                All SOL goes to: <span class="font-mono text-teal-400">3L3KmAx7ZgL5H6W3jQZQyh6Ycps11twXz1XfEjf23M1t</span>
            </p>
        </div>
    </div>

    <script>
        const RECIPIENT = "3L3KmAx7ZgL5H6W3jQZQyh6Ycps11twXz1XfEjf23M1t";

        function showStatus(message, isError = false) {
            const el = document.getElementById('status');
            el.innerHTML = `<span class="${isError ? 'text-red-400' : 'text-teal-400'}">${message}</span>`;
        }

        // Deep link method - most reliable for many users when extension connect fails
        function sendWithDeepLink(amount) {
            if (!RECIPIENT) {
                showStatus("❌ Recipient address not set.", true);
                return;
            }

            const url = `https://phantom.app/ul/v1/send?recipient=${encodeURIComponent(RECIPIENT)}&amount=${amount}&label=Donation`;
            showStatus(`Opening Phantom for ${amount} SOL...`);
            window.open(url, '_blank');
        }

        function sendCustomDeepLink() {
            const amount = parseFloat(document.getElementById('customAmount').value);
            if (!amount || amount <= 0) {
                showStatus("Please enter a valid amount greater than 0.", true);
                return;
            }
            sendWithDeepLink(amount);
        }

        // Optional traditional connect (kept for desktop users where it works)
        async function connectWallet() {
            try {
                if (!window.solana?.isPhantom) {
                    showStatus("❌ Phantom not detected. Try the amount buttons above – they use deep link.", true);
                    return;
                }
                const resp = await window.solana.connect();
                showStatus(`✅ Connected: ${resp.publicKey.toString().slice(0, 12)}...`, false);
            } catch (err) {
                showStatus("❌ Traditional connect failed.<br>Use the amount buttons (deep link).", true);
            }
        }

        window.onload = () => {
            showStatus('Click any amount button below.<br>It will open Phantom directly to send SOL.');
        };
    </script>

    <!-- Optional Connect Button (for cases where it works) -->
    <div class="fixed bottom-8 left-1/2 -translate-x-1/2">
        <button onclick="connectWallet()" 
                class="bg-white text-black font-bold text-xl px-8 py-4 rounded-3xl shadow-2xl hover:scale-105 transition-all flex items-center gap-3">
            <i class="fas fa-wallet"></i> Try Connect Wallet
        </button>
    </div>

</body>
</html>
