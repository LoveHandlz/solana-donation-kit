<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' https: data:;">
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Bangers&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/buffer@6.0.3/index.min.js"></script>
  <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>

  <style>
    :root {
      --bg-deep: #0a132f;
      --bg-panel: #0f1a47;
      --accent-red: #ff2d55;
      --accent-orange: #ff9500;
      --accent-cyan: #00f0ff;
      --accent-gold: #ffd700;
      --text-primary: #e0f7ff;
      --text-secondary: #a5d8ff;
      --card-border: rgba(0, 240, 255, 0.14);
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Orbitron', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ... Keep all your existing styles for header, cards, etc. ... */
    /* (I'm keeping them short here for clarity) */

    .donate-btn {
      background: linear-gradient(135deg, #00ff88, #00cc66);
      color: #000;
      font-weight: 900;
      padding: 0.6rem 1.3rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
    }

    /* OPTIMIZED MODAL */
    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: linear-gradient(180deg, #0f1a47, #1a2547);
      border: 2px solid var(--accent-cyan);
      border-radius: 20px;
      width: 92%;
      max-width: 440px;
      padding: 2rem;
      position: relative;
      box-shadow: 0 0 60px rgba(0, 240, 255, 0.5);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .modal-title {
      font-size: 1.5rem;
      color: var(--accent-gold);
    }

    .amount-options {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 1.5rem 0;
    }

    .amount-btn {
      background: rgba(255,255,255,0.08);
      border: 2px solid var(--accent-cyan);
      color: white;
      padding: 16px 12px;
      border-radius: 14px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .amount-btn:hover, .amount-btn.active {
      background: var(--accent-cyan);
      color: #000;
      transform: scale(1.05);
    }

    .custom-amount {
      display: flex;
      margin: 1rem 0;
      background: rgba(0,0,0,0.4);
      border-radius: 14px;
      overflow: hidden;
    }

    .custom-amount input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      padding: 16px;
      font-size: 1.2rem;
      text-align: center;
    }

    .send-btn {
      width: 100%;
      background: linear-gradient(135deg, #00ff88, #00cc66);
      color: #000;
      font-weight: 900;
      padding: 16px;
      border: none;
      border-radius: 50px;
      font-size: 1.2rem;
      cursor: pointer;
      margin-top: 1rem;
      transition: all 0.3s;
    }

    .send-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .usd-estimate {
      text-align: center;
      color: #ffd700;
      font-size: 0.95rem;
      margin: 8px 0;
    }
  </style>
</head>
<body>
  <!-- Your header and video grid stay exactly the same (12 cards with receiver address) -->

  <!-- OPTIMIZED MODAL -->
  <div id="sponsor-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-skater-title" class="modal-title">Sponsor Skater</h3>
        <span class="close-modal" onclick="closeModal()" style="cursor:pointer; font-size:2rem;">×</span>
      </div>

      <p style="color:var(--text-secondary); margin-bottom:1rem;">Send real SOL on Mainnet</p>

      <div class="amount-options" id="preset-buttons">
        <!-- Populated by JS -->
      </div>

      <div class="usd-estimate" id="usd-estimate">≈ $0.00 USD</div>

      <div class="custom-amount">
        <input type="number" id="custom-amount" placeholder="Custom amount" step="0.001" min="0.001">
      </div>

      <button id="send-btn" class="send-btn" onclick="sendCustomAmount()">
        SEND DONATION
      </button>

      <p style="text-align:center; margin-top:1rem; font-size:0.85rem; color:#ff9500;">
        100% goes to the skater • Instant on-chain
      </p>
    </div>
  </div>

  <script>
    if (typeof window.Buffer === 'undefined') window.Buffer = window.buffer.Buffer;

    let publicKey = null;
    let provider = null;
    let currentSkaterAddress = null;
    let currentSOLPrice = 170;

    const RPC_URL = "https://solana-rpc.publicnode.com";

    // Connect Wallet
    document.getElementById('wallet-btn').addEventListener('click', async () => {
      provider = window.phantom?.solana;
      if (!provider) {
        alert("Please install Phantom Wallet");
        return;
      }
      try {
        const resp = await provider.connect();
        publicKey = resp.publicKey.toString();
        document.getElementById('wallet-btn').innerHTML = `✅ ${publicKey.slice(0,6)}...${publicKey.slice(-4)}`;
      } catch (e) {
        alert("Connection failed");
      }
    });

    // Preset amounts
    const presets = [0.005, 0.01, 0.02, 0.05, 0.10, 0.25];

    function createPresetButtons() {
      const container = document.getElementById('preset-buttons');
      container.innerHTML = '';
      presets.forEach(amount => {
        const btn = document.createElement('button');
        btn.className = 'amount-btn';
        btn.textContent = `${amount} SOL`;
        btn.onclick = () => sendTransaction(amount);
        container.appendChild(btn);
      });
    }

    // Open Modal
    document.querySelectorAll('.donate-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!publicKey) {
          alert("Please connect your Phantom wallet first!");
          return;
        }
        currentSkaterAddress = btn.getAttribute('data-address');
        document.getElementById('modal-skater-title').textContent = 
          btn.closest('.video-card').querySelector('.card-title').textContent;
        
        document.getElementById('sponsor-modal').style.display = 'flex';
        document.getElementById('custom-amount').focus();
      });
    });

    async function sendTransaction(amount) {
      const sendBtn = document.getElementById('send-btn');
      sendBtn.disabled = true;
      sendBtn.textContent = "SENDING...";

      try {
        const conn = new solanaWeb3.Connection(RPC_URL, 'confirmed');
        const fromPubkey = new solanaWeb3.PublicKey(publicKey);
        const toPubkey = new solanaWeb3.PublicKey(currentSkaterAddress);

        const { blockhash } = await conn.getLatestBlockhash();

        const tx = new solanaWeb3.Transaction().add(
          solanaWeb3.SystemProgram.transfer({
            fromPubkey,
            toPubkey,
            lamports: Math.floor(amount * solanaWeb3.LAMPORTS_PER_SOL)
          })
        );

        tx.recentBlockhash = blockhash;
        tx.feePayer = fromPubkey;

        const signedTx = await provider.signTransaction(tx);
        const signature = await conn.sendRawTransaction(signedTx.serialize());

        alert(`✅ ${amount} SOL sent successfully!\n\nTx: ${signature}`);
        closeModal();
      } catch (err) {
        console.error(err);
        alert(err.message.includes("User rejected") ? "Transaction cancelled." : "Transaction failed. Check your SOL balance.");
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = "SEND DONATION";
      }
    }

    function sendCustomAmount() {
      const amount = parseFloat(document.getElementById('custom-amount').value);
      if (amount > 0) sendTransaction(amount);
      else alert("Please enter a valid amount");
    }

    function closeModal() {
      document.getElementById('sponsor-modal').style.display = 'none';
      document.getElementById('custom-amount').value = '';
    }

    // Heart buttons
    document.querySelectorAll('.heart-btn').forEach(btn => {
      btn.addEventListener('click', () => btn.classList.toggle('liked'));
    });

    // Initialize
    window.onload = () => {
      createPresetButtons();
    };
  </script>
</body>
</html>
